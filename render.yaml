services:
  - type: web
    name: scandiweb-backend
    runtime: php
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php -S 0.0.0.0:$PORT -t public
    envVars:
      - key: PHP_VERSION
        value: 8.1
      - key: DB_HOST
        fromDatabase:
          name: scandiweb-mysql
          property: host
      - key: DB_PORT
        fromDatabase:
          name: scandiweb-mysql
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: scandiweb-mysql
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: scandiweb-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: scandiweb-mysql
          property: password

databases:
  - name: scandiweb-mysql
    databaseName: scandiweb_ecommerce
    user: scandiweb
    plan: free